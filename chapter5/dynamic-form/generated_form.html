<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flight Booking · Intent Clarification Form</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         max-width: 560px; margin: 32px auto; padding: 0 20px; line-height: 1.6; }
  h1 { font-size: 20px; }
  .req { color: #666; font-size: 13px; margin: -6px 0 18px; }
  .field { margin-bottom: 16px; }
  .fld-label { display: block; font-weight: 600; margin-bottom: 6px; }
  .fld-input { width: 100%; box-sizing: border-box; padding: 8px 10px;
               border: 1px solid #bbb; border-radius: 6px; font-size: 15px; }
  .radio-row { display: flex; gap: 18px; }
  .radio { font-weight: normal; }
  button { margin-top: 8px; padding: 10px 18px; font-size: 15px; border: 0;
           border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
  #result { background: #f5f5f5; color: #111; padding: 12px; border-radius: 6px;
            white-space: pre-wrap; margin-top: 18px; min-height: 1em; }
</style>
</head>
<body>
<h1>Flight Booking · Intent Clarification Form</h1>
<p class="req">Original request: I want to book a flight to Beijing — Please fill in all the following information at once (return date appears only when "Round Trip" is selected; baggage allowance varies by cabin class).</p>
<form id="clarify-form">
<div class="field"><label class="fld-label" for="departure_city">Departure City</label><input class="fld-input" type="text" id="departure_city" name="departure_city" placeholder="e.g., Shanghai" required></div>
<div class="field"><label class="fld-label" for="departure_date">Departure Date</label><input class="fld-input" type="date" id="departure_date" name="departure_date" required></div>
<div class="field"><span class="fld-label">Trip Type</span><div class="radio-row"><label class="radio"><input type="radio" name="trip_type" value="one_way" checked> One Way</label><label class="radio"><input type="radio" name="trip_type" value="round_trip"> Round Trip</label></div></div>
<div class="field" id="return_date_field" style="display:none"><label class="fld-label" for="return_date">Return Date</label><input class="fld-input" type="date" id="return_date" name="return_date"></div>
<div class="field"><label class="fld-label" for="cabin_class">Cabin Class</label><select class="fld-input" id="cabin_class" name="cabin_class"><option value="economy" selected>Economy</option><option value="business">Business</option><option value="first">First Class</option></select></div>
<div class="field"><label class="fld-label" for="baggage_count">Free Checked Baggage Allowance</label><select class="fld-input" id="baggage_count" name="baggage_count"></select></div>
  <button type="submit">Submit</button>
</form>
<pre id="result"></pre>
<script>

const FORM_CONFIG = {"fields": [{"name": "departure_city"}, {"name": "departure_date"}, {"name": "trip_type"}, {"name": "return_date", "container_id": "return_date_field", "show_when": {"field": "trip_type", "equals": "round_trip"}}, {"name": "cabin_class"}, {"name": "baggage_count", "options_when": {"field": "cabin_class", "map": {"economy": [{"value": "0", "label": "Carry-on only"}, {"value": "1", "label": "1 piece (≤23kg)"}], "business": [{"value": "0", "label": "Carry-on only"}, {"value": "1", "label": "1 piece (≤32kg)"}, {"value": "2", "label": "2 pieces (≤32kg)"}], "first": [{"value": "1", "label": "1 piece (≤32kg)"}, {"value": "2", "label": "2 pieces (≤32kg)"}, {"value": "3", "label": "3 pieces (≤32kg)"}]}}}], "constants": {"destination_city": "Beijing"}};
const form = document.getElementById('clarify-form');

function valueOf(name) {
  const el = form.elements[name];
  if (!el) return '';
  return el.value || '';
}

function applyCascade() {
  FORM_CONFIG.fields.forEach(function (f) {
    // Cascade ①: show_when — control field container visibility
    if (f.show_when) {
      const box = document.getElementById(f.container_id);
      if (box) {
        const show = valueOf(f.show_when.field) === f.show_when.equals;
        box.style.display = show ? '' : 'none';
      }
    }
    // Cascade ②: options_when — dynamically rebuild dropdown options based on another field's value
    if (f.options_when) {
      const sel = form.elements[f.name];
      if (sel) {
        const key = valueOf(f.options_when.field);
        const opts = f.options_when.map[key] || [];
        const prev = sel.value;
        sel.innerHTML = '';
        opts.forEach(function (o) {
          const opt = document.createElement('option');
          opt.value = o.value;
          opt.textContent = o.label;
          sel.appendChild(opt);
        });
        if (opts.some(function (o) { return o.value === prev; })) sel.value = prev;
      }
    }
  });
}

form.addEventListener('change', applyCascade);
applyCascade();  // Apply once on initial load

form.addEventListener('submit', function (e) {
  e.preventDefault();
  const data = {};
  FORM_CONFIG.fields.forEach(function (f) {
    // Hidden (collapsed) cascade fields are excluded from submission
    if (f.container_id) {
      const box = document.getElementById(f.container_id);
      if (box && box.style.display === 'none') return;
    }
    const v = valueOf(f.name);
    if (v !== '') data[f.name] = v;
  });
  Object.assign(data, FORM_CONFIG.constants || {});
  document.getElementById('result').textContent = JSON.stringify(data, null, 2);
});

</script>
</body>
</html>
