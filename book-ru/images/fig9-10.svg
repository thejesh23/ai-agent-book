<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 780 310" width="780" height="310" style="background:#ffffff">
<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#333333"/></marker><marker id="ah-light" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#999999"/></marker></defs>

<rect x="40" y="65" width="200" height="120" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="140" y="85" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Фактический экран</text>
<text x="118" y="108" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">2560 × 1440</text>
<text x="140" y="128" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">или другое разрешение</text>
<text x="140" y="150" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Клик пользователя: (1280, 720)</text>
<circle cx="155" cy="165" r="4" fill="#333333" stroke="#333333" stroke-width="2"/>
<rect x="290" y="65" width="200" height="120" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="390" y="85" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Разрешение обучения модели</text>
<text x="408" y="108" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">XGA: 1024×768</text>
<text x="390" y="126" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">WXGA: 1280×800</text>
<text x="390" y="144" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">FWXGA: 1366×768</text>
<text x="390" y="165" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="6.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Выбор наилучшего совпадения по соотношению сторон</text>
<rect x="540" y="65" width="200" height="120" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="640" y="85" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Модель выводит координаты</text>
<text x="652.2" y="108" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="8.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">На основе уменьшенного изображения</text>
<text x="640" y="128" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="normal">Прогноз: (683, 384)</text>
<circle cx="650" cy="145" r="4" fill="#333333" stroke="#333333" stroke-width="2"/>
<text x="640" y="168" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="8.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">→ Уменьшить до фактического разрешения</text>
<line x1="242" y1="110" x2="288" y2="110" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<text x="260.4" y="100.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#666666" text-anchor="middle">Уменьшение масштаба</text>
<line x1="492" y1="140" x2="538" y2="140" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<line x1="538" y1="110" x2="492" y2="110" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<text x="514" y="100.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle">Координаты</text>
<rect x="40" y="200" width="700" height="60" rx="4" fill="#f5f5f5" stroke="#333333" stroke-width="2"/>
<text x="390" y="218" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Полный рабочий процесс</text>
<text x="390" y="242" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="6.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">① Выбор целевого разрешения по соотношению сторон → ② Уменьшение скриншота через ImageMagick → ③ Модель выводит координаты → ④ Пропорциональное увеличение → ⑤ Выполнение через xdotool</text>
<rect x="40" y="275" width="700" height="55" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="390" y="293" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Пример масштабирования (экран 16:9 → FWXGA)</text>
<text x="390" y="315" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Скриншот: 2560×1440 → 1366×768 (×0.53)  |  Координаты: Модель (683, 384) → Фактические (1280, 720) (×1.87)</text>
</svg>