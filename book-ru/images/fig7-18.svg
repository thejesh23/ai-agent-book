<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 850 390" width="850" height="390" style="background:#ffffff">
<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#333333"/></marker><marker id="ah-light" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#999999"/></marker></defs>

<rect x="80" y="120" width="160" height="80" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="160" y="140" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">модель политики πθ</text>
<text x="160" y="160" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">генерация действия:</text>
<text x="160" y="178" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">размышление/поиск/код/ответ</text>
<rect x="320" y="70" width="160" height="60" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="400" y="90" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">выполнение инструмента</text>
<text x="400" y="110" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Вызов API / песочница кода</text>
<rect x="320" y="200" width="160" height="60" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="400" y="220" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14.5" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">разбор результата</text>
<text x="400" y="240" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="7.5" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">сообщение об успехе/неудаче/ошибке</text>
<rect x="560" y="120" width="170" height="80" rx="6" fill="#f5f5f5" stroke="#333333" stroke-width="2"/>
<text x="645" y="140" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">расчёт reward</text>
<text x="645" y="160" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">правильно: +1</text>
<text x="645" y="178" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">неверно: −1</text>
<line x1="242" y1="140" x2="318" y2="100" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<line x1="482" y1="100" x2="558" y2="140" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<line x1="480" y1="230" x2="558" y2="180" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<line x1="355" y1="132" x2="355" y2="198" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<path d="M 645,200 Q 400,151 160,202" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<text x="400" y="275" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">обновление градиента политики</text>
<rect x="40" y="300" width="770" height="110" rx="4" fill="#f5f5f5" stroke="#333333" stroke-width="2"/>
<text x="390" y="330" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Три уровня сложности в RL для использования инструментов</text>
<text x="88" y="367" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="7" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Уровень 1: Освоение одного инструмента</text>
<text x="102.4" y="392" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="7" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">когда вызывать + как вызывать + обработка ошибок</text>
<text x="362.4" y="367" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14.49" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Уровень 2: Выбор из нескольких инструментов</text>
<text x="398.9" y="392" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.46" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">поиск / код / разбор документов: выбрать один из трёх</text>
<text x="700.2" y="367" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="8" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Уровень 3: Оркестрация цепочки инструментов</text>
<text x="700.2" y="386" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="7" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Управление зависимостями + ограничения</text>
<text x="700.2" y="398" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="7" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">взаимного исключения + оптимизация затрат</text>
</svg>