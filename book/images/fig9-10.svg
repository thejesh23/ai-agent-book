<text x="390" y="218" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Full workflow</text>
<text x="390" y="242" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">① Select target resolution by aspect ratio → ② Downscale screenshot with ImageMagick → ③ Model inference generates coordinates → ④ Scale up proportionally → ⑤ Execute with xdotool</text>
