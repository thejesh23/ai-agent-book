<text x="438" y="281" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Reward + language feedback + self-reflection</text>
<text x="390" y="281" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="bold">Learning Signal</text>
<rect x="30" y="307" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<rect x="430" y="307" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="38" y="329" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">No internal thinking (purely reactive)</text>
<text x="438" y="329" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Thinking as a special action (CoT)</text>
<text x="390" y="329" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="bold">Thinking Ability</text>
<rect x="30" y="355" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<rect x="430" y="355" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="38" y="377" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Single environment, rule changes require retraining</text>
<text x="438" y="377" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Cross-task zero-shot / few-shot transfer</text>
<text x="390" y="377" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="bold">Generalization Ability</text>
<rect x="30" y="403" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<rect x="430" y="403" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="38" y="425" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">~10000 episodes / 10 seconds</text>
<text x="438" y="425" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">~1 episode / 2 minutes</text>
