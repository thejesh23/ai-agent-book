<text x="38" y="185" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Zero prior, start from random policy</text>
<text x="438" y="185" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Massive pretrained knowledge + language game rules</text>
<text x="390" y="185" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="bold">Prior Knowledge</text>
<rect x="30" y="211" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<rect x="430" y="211" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="38" y="233" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Hash encoding: state_id=0x3A7F</text>
<text x="438" y="233" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#333333" text-anchor="start" dominant-baseline="central" font-weight="normal">Semantic understanding: &amp;quot;There is a red key in the storage room&amp;quot;</text>
<text x="390" y="233" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="bold">State Representation</text>
<rect x="30" y="259" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<rect x="430" y="259" width="320" height="44" rx="3" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
