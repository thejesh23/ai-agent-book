<rect x="35" y="160" width="190" height="42" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="130" y="175" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Left wrist camera</text>
<text x="130" y="193" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">224×224 RGB</text>
<rect x="35" y="215" width="190" height="42" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="130" y="230" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Right wrist camera</text>
<text x="130" y="248" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">224×224 RGB</text>
<rect x="35" y="275" width="190" height="30" rx="4" fill="#f5f5f5" stroke="#999999" stroke-width="2"/>
<text x="45" y="290" font-family="'Courier New', Courier, monospace" font-size="12" fill="#333333" text-anchor="start" dominant-baseline="central">14-dimensional joint state vector</text>
