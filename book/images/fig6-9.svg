<line x1="430" y1="345" x2="430" y2="315" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="630" y="65" width="230" height="250" rx="6" fill="#ffffff" stroke="#333333" stroke-width="2" stroke-dasharray="8,4"/>
<text x="745" y="88" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">SAPIEN physics engine</text>
