<line x1="240" y1="290" x2="270" y2="257" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="300" y="345" width="260" height="32" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
