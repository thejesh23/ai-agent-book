<text x="745" y="145" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">7 DOF each = 14-dimensional action</text>
<rect x="645" y="175" width="200" height="55" rx="6" fill="#d0d0d0" stroke="#333333" stroke-width="2"/>
<text x="745" y="195" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Environment randomization</text>
<text x="745" y="215" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Position 60cm / orientation ±22.5°</text>
<rect x="645" y="245" width="200" height="55" rx="6" fill="#f0f0f0" stroke="#333333" stroke-width="2"/>
<text x="745" y="265" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#333333" text-anchor="middle" dominant-baseline="central" font-weight="bold">Collision detection + physics simulation</text>
<text x="745" y="285" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">Rigid body / soft body / friction</text>
<line x1="590" y1="220" x2="628" y2="220" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<text x="609.0" y="210.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#666666" text-anchor="middle">Action</text>
